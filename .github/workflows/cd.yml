name: CD

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  release:
    types: [ published ]

env:
  PYTHON_VERSION: "3.11"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  prepare:
    name: Prepare Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      is_release: ${{ steps.check.outputs.is_release }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Check if release
      id: check
      run: |
        if [[ $GITHUB_REF == refs/tags/v* ]]; then
          echo "is_release=true" >> $GITHUB_OUTPUT
        else
          echo "is_release=false" >> $GITHUB_OUTPUT
        fi

    - name: Generate version
      id: version
      run: |
        if [[ $GITHUB_REF == refs/tags/v* ]]; then
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
        else
          VERSION="0.1.0-dev.$(git rev-parse --short HEAD)"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
        fi

  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: prepare
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=semver,pattern={{major}}
          type=sha,prefix={{branch}}-

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        build-args: |
          VERSION=${{ needs.prepare.outputs.version }}
          BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
          GIT_COMMIT=${{ github.sha }}

  test-deployment:
    name: Test Deployment
    runs-on: ubuntu-latest
    needs: [prepare, build-and-push]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Compose
      run: |
        # Создаем тестовую конфигурацию
        cp docker-compose.prod.yml docker-compose.test.yml
        sed -i 's/fitness-tracker-v2:latest/ghcr.io\/${{ github.repository }}:main/' docker-compose.test.yml

    - name: Test deployment with Docker Compose
      run: |
        echo "Testing deployment..."
        docker-compose -f docker-compose.test.yml up -d --wait

        # Ждем запуска сервисов
        sleep 30

        # Проверяем health endpoints
        curl -f http://localhost:8000/health || exit 1
        curl -f http://localhost:8000/api/v1/health || exit 1

        # Проверяем метрики
        curl -f http://localhost:8000/metrics || echo "Metrics endpoint not available"

        # Останавливаем сервисы
        docker-compose -f docker-compose.test.yml down

        echo "✅ Deployment test passed!"

  deploy-synology:
    name: Deploy to Synology
    runs-on: ubuntu-latest
    needs: [prepare, build-and-push, test-deployment]
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup SSH
      uses: webfactory/ssh-agent@v0.8.0
      with:
        ssh-private-key: ${{ secrets.SYNOLOGY_SSH_KEY }}

    - name: Add Synology to known hosts
      run: |
        ssh-keyscan -H ${{ secrets.SYNOLOGY_HOST }} >> ~/.ssh/known_hosts

    - name: Deploy to Synology
      env:
        SYNOLOGY_HOST: ${{ secrets.SYNOLOGY_HOST }}
        SYNOLOGY_USER: ${{ secrets.SYNOLOGY_USER }}
        IMAGE_TAG: main
      run: |
        echo "🚀 Deploying to Synology NAS..."

        # Создаем deployment скрипт
        cat > deploy.sh << 'EOF'
        #!/bin/bash
        set -e

        echo "📦 Pulling latest image..."
        docker pull ghcr.io/${{ github.repository }}:main

        echo "🔄 Updating application..."
        cd /volume1/docker/fitness-tracker-v2

        # Backup current version
        docker-compose down || true

        # Update docker-compose.yml with new image
        sed -i 's|image: .*|image: ghcr.io/${{ github.repository }}:main|' docker-compose.yml

        # Start new version
        docker-compose up -d --remove-orphans

        echo "⏳ Waiting for application to start..."
        sleep 30

        # Health check
        if curl -f http://localhost:8000/health; then
          echo "✅ Deployment successful!"

          # Cleanup old images
          docker image prune -f
        else
          echo "❌ Health check failed, rolling back..."
          docker-compose down
          # Rollback logic here if needed
          exit 1
        fi
        EOF

        # Копируем и выполняем скрипт на Synology
        scp deploy.sh ${{ env.SYNOLOGY_USER }}@${{ env.SYNOLOGY_HOST }}:/tmp/
        ssh ${{ env.SYNOLOGY_USER }}@${{ env.SYNOLOGY_HOST }} 'chmod +x /tmp/deploy.sh && /tmp/deploy.sh'

        echo "🎉 Synology deployment completed!"

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [prepare, build-and-push, test-deployment]
    if: needs.prepare.outputs.is_release == 'true'
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Generate changelog
      id: changelog
      run: |
        # Простой генератор changelog
        echo "## Changes" > RELEASE_NOTES.md
        echo "" >> RELEASE_NOTES.md

        # Получаем коммиты с последнего тега
        PREV_TAG=$(git describe --tags --abbrev=0 HEAD^)
        git log ${PREV_TAG}..HEAD --pretty=format:"- %s (%h)" >> RELEASE_NOTES.md

        echo "" >> RELEASE_NOTES.md
        echo "## Docker Image" >> RELEASE_NOTES.md
        echo "- \`ghcr.io/${{ github.repository }}:${{ needs.prepare.outputs.version }}\`" >> RELEASE_NOTES.md

    - name: Create Release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref }}
        release_name: Release ${{ needs.prepare.outputs.version }}
        body_path: RELEASE_NOTES.md
        draft: false
        prerelease: false

  notify-success:
    name: Notify Deployment Success
    runs-on: ubuntu-latest
    needs: [prepare, build-and-push, test-deployment, deploy-synology]
    if: always() && (needs.deploy-synology.result == 'success' || needs.deploy-synology.result == 'skipped')

    steps:
    - name: Success notification
      run: |
        echo "🎉 CD Pipeline completed successfully!"
        echo "Version: ${{ needs.prepare.outputs.version }}"
        echo "Image: ghcr.io/${{ github.repository }}:main"
        echo "Deployment: ${{ needs.deploy-synology.result }}"

        if [[ "${{ needs.deploy-synology.result }}" == "success" ]]; then
          echo "✅ Successfully deployed to Synology NAS"
        else
          echo "ℹ️ Synology deployment skipped (not main branch)"
        fi

  notify-failure:
    name: Notify Deployment Failure
    runs-on: ubuntu-latest
    needs: [prepare, build-and-push, test-deployment, deploy-synology]
    if: failure()

    steps:
    - name: Failure notification
      run: |
        echo "❌ CD Pipeline failed!"
        echo "Build: ${{ needs.build-and-push.result }}"
        echo "Test: ${{ needs.test-deployment.result }}"
        echo "Deploy: ${{ needs.deploy-synology.result }}"
        exit 1
