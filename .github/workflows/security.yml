name: Security

on:
  schedule:
    # Запуск каждую неделю в понедельник в 09:00 UTC
    - cron: '0 9 * * 1'
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: # Позволяет запускать вручную

env:
  PYTHON_VERSION: "3.11"

jobs:
  dependency-scan:
    name: Dependency Security Scan
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install safety bandit[toml] pip-audit

    - name: Run Safety check
      run: |
        echo "🔍 Running Safety dependency scan..."
        safety check --json --output safety-report.json || true
        safety check --short-report || true

    - name: Run pip-audit
      run: |
        echo "🔍 Running pip-audit scan..."
        pip-audit --format=json --output=pip-audit-report.json || true
        pip-audit || true

    - name: Upload dependency scan results
      uses: actions/upload-artifact@v3
      with:
        name: dependency-scan-results
        path: |
          safety-report.json
          pip-audit-report.json

  code-scan:
    name: Code Security Scan
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Install Bandit
      run: |
        python -m pip install --upgrade pip
        pip install bandit[toml]

    - name: Run Bandit security scan
      run: |
        echo "🔍 Running Bandit code security scan..."
        bandit -r app/ -f json -o bandit-report.json || true
        bandit -r app/ -ll || true

    - name: Upload code scan results
      uses: actions/upload-artifact@v3
      with:
        name: code-scan-results
        path: bandit-report.json

  docker-scan:
    name: Docker Image Security Scan
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker image for scanning
      uses: docker/build-push-action@v5
      with:
        context: .
        push: false
        tags: fitness-tracker-v2:security-scan
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: 'fitness-tracker-v2:security-scan'
        format: 'sarif'
        output: 'trivy-results.sarif'

    - name: Upload Trivy scan results to GitHub Security tab
      uses: github/codeql-action/upload-sarif@v3
      if: always()
      with:
        sarif_file: 'trivy-results.sarif'

    - name: Run Trivy vulnerability scanner (table format)
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: 'fitness-tracker-v2:security-scan'
        format: 'table'

    - name: Upload Docker scan results
      uses: actions/upload-artifact@v3
      with:
        name: docker-scan-results
        path: trivy-results.sarif

  secrets-scan:
    name: Secrets Scan
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Run TruffleHog OSS
      uses: trufflesecurity/trufflehog@main
      with:
        path: ./
        base: main
        head: HEAD
        extra_args: --debug --only-verified

  security-report:
    name: Generate Security Report
    runs-on: ubuntu-latest
    needs: [dependency-scan, code-scan, docker-scan, secrets-scan]
    if: always()

    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v3

    - name: Generate security summary
      run: |
        echo "# 🔒 Security Scan Report" > security-summary.md
        echo "" >> security-summary.md
        echo "**Scan Date:** $(date)" >> security-summary.md
        echo "**Commit:** ${{ github.sha }}" >> security-summary.md
        echo "" >> security-summary.md

        echo "## 📋 Scan Results" >> security-summary.md
        echo "" >> security-summary.md
        echo "- **Dependencies**: ${{ needs.dependency-scan.result }}" >> security-summary.md
        echo "- **Code**: ${{ needs.code-scan.result }}" >> security-summary.md
        echo "- **Docker**: ${{ needs.docker-scan.result }}" >> security-summary.md
        echo "- **Secrets**: ${{ needs.secrets-scan.result }}" >> security-summary.md
        echo "" >> security-summary.md

        if [ "${{ needs.dependency-scan.result }}" = "success" ] && [ "${{ needs.code-scan.result }}" = "success" ] && [ "${{ needs.docker-scan.result }}" = "success" ] && [ "${{ needs.secrets-scan.result }}" = "success" ]; then
          echo "## ✅ Security Status: PASSED" >> security-summary.md
          echo "All security scans completed successfully!" >> security-summary.md
        else
          echo "## ⚠️ Security Status: ATTENTION REQUIRED" >> security-summary.md
          echo "Some security scans need attention. Please review the artifacts." >> security-summary.md
        fi

    - name: Upload security summary
      uses: actions/upload-artifact@v3
      with:
        name: security-summary
        path: security-summary.md

    - name: Comment PR with security results
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v6
      with:
        script: |
          const fs = require('fs');
          const summary = fs.readFileSync('security-summary.md', 'utf8');

          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: summary
          });
